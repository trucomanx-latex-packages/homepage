<html>
<head>
    <!-- Substitua o PHP por um fetch para o head -->
    <script>
        fetch('include/head.html')
            .then(response => response.text())
            .then(data => {
                document.head.innerHTML += data;
            });
    </script>
</head>
<body>
    <!-- Header carregado via JS -->
    <div id="header-container"></div>
    <script>
        fetch('include/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            });
    </script>

	<div class="header gradient">
	<div class="promo-area">
		<h2>LATEX-MACROS-PACKAGES</h2>
		<p>
			Can be downloaded many latex macro packages from the git repository of 
			<a href="https://github.com/trucomanx-latex-packages"><b>latex-macros-packages</b></a> 
			project.
		</p> 
	</div>
	</div>
